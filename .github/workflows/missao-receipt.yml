name: missao-receipt

on:
  pull_request:
  push:

jobs:
  missao-receipt:
    name: missao-receipt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main for bootstrap base
        run: git fetch --no-tags origin main:refs/remotes/origin/main || true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify mission receipt
        env:
          CARTORIO_BOOTSTRAP_KEYRING_FINGERPRINT: ${{ secrets.CARTORIO_BOOTSTRAP_KEYRING_FINGERPRINT }}
          CARTORIO_BOOTSTRAP_BASE_REF: origin/main
          RECEIPT_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node cartorio/bin/verify-receipt.js --app-dir cartorio --commit "$RECEIPT_COMMIT"
